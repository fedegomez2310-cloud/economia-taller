*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}:root{--accent:#1D9E75;--danger:#E24B4A;--warn:#EF9F27;--info:#378ADD;--bg:#fff;--bg2:#f6f6f4;--border:rgba(0,0,0,.1);--text:#1a1a1a;--muted:#666}@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#242424;--border:rgba(255,255,255,.12);--text:#f0f0f0;--muted:#999}}button,input,select,textarea{font-family:inherit}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 14px;border:.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-weight:600;cursor:pointer;min-height:40px}.btn.p{background:var(--accent);border-color:var(--accent);color:#fff}.btn.d{color:var(--danger);border-color:var(--danger)}.btn.sm{font-size:12px;padding:7px 10px;min-height:34px}.btn.full{width:100%}.auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.authbox{width:min(360px,100%);border:.5px solid var(--border);border-radius:18px;padding:28px 22px;text-align:center}.tabs{display:flex;background:var(--bg2);padding:3px;border-radius:8px;margin:18px 0}.tabs button{flex:1;border:0;background:transparent;color:var(--muted);padding:8px;border-radius:6px}.tabs button.active{background:var(--bg);color:var(--text)}.frow{margin-bottom:12px;text-align:left}.frow label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.35px;margin-bottom:4px}.frow input,.frow select,.frow textarea{width:100%;border:.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);padding:11px 12px;font-size:15px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.app{display:none;min-height:100vh;flex-direction:column}.top{position:sticky;top:0;z-index:20;background:var(--bg);display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:.5px solid var(--border)}.nav{position:sticky;top:57px;z-index:19;display:flex;overflow:auto;background:var(--bg);border-bottom:.5px solid var(--border)}.nav::-webkit-scrollbar{display:none}.nav button{flex-shrink:0;border:0;background:transparent;color:var(--muted);padding:10px 11px;font-size:11px;border-bottom:2px solid transparent;display:flex;gap:4px;align-items:center}.nav button.active{color:var(--accent);border-bottom-color:var(--accent)}.page{display:none;padding:16px}.page.active{display:block}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.head h2{font-size:16px}.card{background:var(--bg);border:.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.metric{background:var(--bg2);border-radius:10px;padding:12px}.metric small{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.metric strong{font-size:20px}.li{display:flex;gap:10px;align-items:center;border-bottom:.5px solid var(--border);padding:10px 0}.li:last-child{border-bottom:0}.li .info{flex:1;min-width:0}.li .name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.li .sub{font-size:12px;color:var(--muted);margin-top:2px}.badge{font-size:10px;padding:3px 8px;border-radius:99px;background:var(--bg2);font-weight:700}.b-pendiente{background:#FAEEDA;color:#633806}.b-confirmado,.b-aprobado{background:#EAF3DE;color:#27500A}.b-produccion{background:#DCEBFA;color:#0B416E}.b-finalizado{background:#E1F5EE;color:#085041}.b-cancelado{background:#FCEBEB;color:#791F1F}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center}.overlay.open{display:flex}.sheet{width:100%;max-width:560px;max-height:92vh;overflow:auto;background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px 40px}.sheet-title{font-size:17px;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.slabel{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}.close{border:0;background:transparent;color:var(--muted);font-size:24px;cursor:pointer}.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}.toast{display:none;position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111;color:#fff;border-radius:18px;padding:9px 16px;z-index:200;font-size:13px}.thumb{height:125px;border-radius:10px;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:28px;margin-bottom:10px}.thumb img{width:100%;height:100%;object-fit:cover}.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}.chip{font-size:10px;background:var(--bg2);border-radius:99px;padding:3px 8px;color:var(--muted)}.search{position:relative}.drop{position:absolute;left:0;right:0;top:100%;background:var(--bg);border:.5px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.12);border-radius:10px;z-index:101;max-height:240px;overflow:auto;display:none}.drop.open{display:block}.drop .opt{padding:10px;border-bottom:.5px solid var(--border);cursor:pointer}.drop .opt:hover{background:var(--bg2)}.prodline{display:flex;gap:8px;align-items:center;background:var(--bg2);border-radius:10px;padding:10px;margin-bottom:8px}.prodline .info{flex:1}.pdf{display:none;position:fixed;inset:0;background:rgba(0,0,0,.76);z-index:180;align-items:flex-start;justify-content:center;padding:12px;overflow:auto}.pdf.open{display:flex}.pdfbox{background:#fff;color:#111;width:100%;max-width:560px;border-radius:14px;overflow:hidden;margin:auto}.pdfcontent{max-height:64vh;overflow:auto}.PR{font-family:Georgia,serif;padding:28px 24px}.PRhead{display:flex;justify-content:space-between;border-bottom:2px solid #111;padding-bottom:14px;margin-bottom:18px}.PR h1{font-size:19px;letter-spacing:1px;text-transform:uppercase}.PR small{color:#666}.PR table{width:100%;border-collapse:collapse;margin:14px 0}.PR th{font-size:9px;text-transform:uppercase;color:#777;text-align:left;border-bottom:1px solid #ddd;padding-bottom:5px}.PR td{font-size:13px;border-bottom:1px solid #eee;padding:8px 0;vertical-align:top}.PR td:last-child{text-align:right;font-weight:700}.PRtotal{display:flex;justify-content:space-between;align-items:baseline;border-top:2px solid #111;padding-top:14px;margin-top:14px}.PRtotal strong{font-size:28px}.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{min-height:66px;background:var(--bg2);border-radius:8px;padding:6px;font-size:11px}.task{margin-top:4px;border-radius:5px;padding:3px 4px;background:#DCEBFA;color:#0B416E;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.hidden{display:none!important}
</style>

<div class="toast" id="toast"></div>
<div class="auth" id="auth-screen"><div class="authbox"><div style="font-size:34px">🔧</div><h1 style="font-size:21px">Economía del Taller</h1><p style="color:var(--muted);font-size:13px;margin-top:4px">ERP interno · Un Atelier / Fede Gomez Friera</p><div class="tabs"><button class="active" onclick="setAuthMode('login')">Ingresar</button><button onclick="setAuthMode('register')">Registrarse</button></div><div id="auth-err" style="min-height:18px;color:var(--danger);font-size:12px"></div><div class="frow"><label>Email</label><input id="a-email" type="email"></div><div class="frow"><label>Contraseña</label><input id="a-pass" type="password"></div><button class="btn p full" id="auth-btn" onclick="doAuth()">Ingresar</button></div></div>
<div class="app" id="app-screen"><div class="top"><div><b>🔧 Economía del Taller</b><div id="user-email" style="font-size:10px;color:var(--muted)"></div></div><button class="btn sm d" onclick="doLogout()"><i class="ti ti-logout"></i></button></div><nav class="nav" id="nav"></nav><main id="pages"></main></div>
<div class="pdf" id="pdf"><div class="pdfbox"><div style="display:flex;justify-content:space-between;padding:14px;border-bottom:1px solid #eee"><b>Documento</b><button class="close" onclick="closePdf()">×</button></div><div class="pdfcontent" id="pdf-content"></div><div style="display:flex;gap:8px;padding:12px;border-top:1px solid #eee"><button class="btn full" onclick="closePdf()">Cerrar</button><button class="btn p full" onclick="shareDoc()"><i class="ti ti-share"></i>Compartir</button><button class="btn full" onclick="printDoc()"><i class="ti ti-printer"></i>PDF</button></div></div></div>

<script>
window.addEventListener('load',function(){
const firebaseConfig={apiKey:'AIzaSyBl-3tb0qqJL7l-1TThOLljRhn9MsoOQQM',authDomain:'economia-del-taller.firebaseapp.com',projectId:'economia-del-taller',storageBucket:'economia-del-taller.firebasestorage.app',messagingSenderId:'999276079590',appId:'1:999276079590:web:515dee9e869a33f5430e27'};
firebase.initializeApp(firebaseConfig);const auth=firebase.auth(),db=firebase.firestore();
const $=id=>document.getElementById(id),fmt=n=>'$'+Math.round(Number(n||0)).toLocaleString('es-AR'),today=()=>new Date().toISOString().slice(0,10),uid=()=>auth.currentUser&&auth.currentUser.uid;
let authMode='login',state={productos:[],clientes:[],presupuestos:[],gastos:[],caja:[],ordenes:[],usuarios:[],inventario:[],historial:[],recibos:[]},unsubs=[],currentRole='admin',currentDocText='',presupItems=[],pagoItems=[],productoFotos=[];
const COLS=['productos','clientes','presupuestos','gastos','caja','ordenes','usuarios','inventario','historial','recibos'];
const roles={admin:['dashboard','productos','clientes','presupuestos','produccion','inventario','caja','gastos','usuarios','actividad','config'],produccion:['produccion','inventario','actividad']};
const pages=[['dashboard','Tablero','ti-layout-dashboard'],['productos','Productos','ti-box'],['clientes','Clientes','ti-users'],['presupuestos','Presupuestos','ti-receipt'],['produccion','Producción','ti-calendar-cog'],['inventario','Inventario','ti-packages'],['caja','Caja','ti-wallet'],['gastos','Gastos','ti-arrow-up-circle'],['usuarios','Usuarios','ti-user-cog'],['actividad','Actividad','ti-history'],['config','Config','ti-settings']];
function toast(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',2300)}
function coll(c){return db.collection('users').doc(uid()).collection(c)}
function log(action,tipo,id){if(!uid())return;coll('historial').add({action,tipo,itemId:id||'',usuario:auth.currentUser.email,fecha:Date.now()}).catch(()=>{})}
function add(c,d,cb){coll(c).add({...d,createdAt:Date.now(),updatedAt:Date.now()}).then(r=>{log('Creó '+c,c,r.id);toast('Guardado ✓');cb&&cb(r.id)}).catch(e=>toast('Error: '+e.message))}
function upd(c,id,d,cb){coll(c).doc(id).update({...d,updatedAt:Date.now()}).then(()=>{log('Editó '+c,c,id);toast('Actualizado ✓');cb&&cb()}).catch(e=>toast('Error: '+e.message))}
function del(c,id){if(!confirm('¿Eliminar?'))return;coll(c).doc(id).delete().then(()=>{log('Eliminó '+c,c,id);toast('Eliminado')})}
function nextCode(prefix,arr){let max=0;arr.forEach(x=>{let m=String(x.codigo||x.numero||'').match(/(\d+)/);if(m)max=Math.max(max,parseInt(m[1]))});return prefix+'-'+String(max+1).padStart(4,'0')}
function can(page){return (roles[currentRole]||roles.admin).includes(page)}
window.setAuthMode=m=>{authMode=m;document.querySelectorAll('.tabs button').forEach((b,i)=>b.classList.toggle('active',['login','register'][i]===m));$('auth-btn').textContent=m==='login'?'Ingresar':'Crear cuenta'};
window.doAuth=()=>{let e=$('a-email').value.trim(),p=$('a-pass').value;if(!e||!p)return $('auth-err').textContent='Completá email y contraseña';(authMode==='login'?auth.signInWithEmailAndPassword(e,p):auth.createUserWithEmailAndPassword(e,p)).catch(x=>$('auth-err').textContent=x.message)};
window.doLogout=()=>{unsubs.forEach(u=>u());unsubs=[];auth.signOut()};
auth.onAuthStateChanged(async u=>{if(!u){$('auth-screen').style.display='flex';$('app-screen').style.display='none';return}$('auth-screen').style.display='none';$('app-screen').style.display='flex';$('user-email').textContent=u.email;await loadRole();initListeners();buildNav();render()});
async function loadRole(){let qs=await coll('usuarios').where('email','==',auth.currentUser.email).limit(1).get();if(qs.empty){currentRole='admin';await coll('usuarios').add({nombre:'Administrador',email:auth.currentUser.email,rol:'admin',permisos:roles.admin,createdAt:Date.now()})}else currentRole=qs.docs[0].data().rol||'admin'}
function initListeners(){unsubs.forEach(u=>u());unsubs=[];COLS.forEach(c=>unsubs.push(coll(c).onSnapshot(s=>{state[c]=s.docs.map(d=>({id:d.id,...d.data()}));render()})))}
function buildNav(){let n=$('nav');n.innerHTML='';pages.filter(p=>can(p[0])).forEach((p,i)=>{let b=document.createElement('button');b.innerHTML=`<i class="ti ${p[2]}"></i>${p[1]}`;b.onclick=()=>showPage(p[0]);if(i===0)b.classList.add('active');n.appendChild(b)});$('pages').innerHTML=pages.filter(p=>can(p[0])).map((p,i)=>`<section class="page ${i===0?'active':''}" id="page-${p[0]}"></section>`).join('')}
window.showPage=id=>{if(!can(id))return toast('Sin permiso');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));$('page-'+id).classList.add('active');[...$('nav').children].find(b=>b.textContent.toLowerCase().includes(pages.find(p=>p[0]===id)[1].toLowerCase()))?.classList.add('active');render()};
function render(){if(!uid())return;renderDashboard();renderProductos();renderClientes();renderPresupuestos();renderProduccion();renderInventario();renderCaja();renderGastos();renderUsuarios();renderActividad();renderConfig()}
function renderDashboard(){let el=$('page-dashboard');if(!el)return;let pendientes=sum(state.presupuestos.filter(p=>p.estado==='pendiente'),p=>p.total),confirmados=sum(state.presupuestos.filter(p=>['confirmado','produccion'].includes(p.estado)),p=>p.total),caja=sum(state.caja,m=>m.tipo==='ingreso'?m.monto:-m.monto),stockBajo=state.inventario.filter(x=>Number(x.cantidad)<=Number(x.minimo||0)).length;el.innerHTML=`<div class="metrics"><div class="metric"><small>Caja</small><strong>${fmt(caja)}</strong></div><div class="metric"><small>Presup. pendientes</small><strong>${fmt(pendientes)}</strong></div><div class="metric"><small>Confirmados</small><strong>${fmt(confirmados)}</strong></div><div class="metric"><small>Stock bajo</small><strong>${stockBajo}</strong></div></div><div class="card"><b>Próximas entregas</b>${list(state.ordenes.filter(o=>o.estado!=='finalizado').slice(0,6),o=>`<div class="li"><div class="info"><div class="name">${o.numero||''} · ${o.producto||o.descripcion}</div><div class="sub">${o.cliente||''} · entrega ${o.fechaEntrega||'a definir'}</div></div><span class="badge b-${o.estado}">${o.estado}</span></div>`)}</div>`}
function sum(a,f){return a.reduce((s,x)=>s+Number(f(x)||0),0)}function list(a,f){return a.length?a.map(f).join(''):'<div class="card" style="text-align:center;color:var(--muted)">Sin datos</div>'}
function imgOf(p){return (p.fotos&&p.fotos[0])?`<img src="${p.fotos[0]}">`:'<i class="ti ti-photo"></i>'}
function renderProductos(){let el=$('page-productos');if(!el)return;el.innerHTML=`<div class="head"><h2>Productos</h2><button class="btn p sm" onclick="openProducto()"><i class="ti ti-plus"></i>Nuevo</button></div><div class="frow"><input placeholder="Buscar por código, nombre o material..." oninput="filterCards('producto-card',this.value)"></div>${list(state.productos,p=>`<div class="prod-card producto-card card" data-q="${q(p.codigo,p.nombre,p.materiales,p.terminacion)}" onclick="viewProducto('${p.id}')"><div class="thumb">${imgOf(p)}</div><div style="display:flex;justify-content:space-between;gap:8px"><div><b>${p.nombre}</b><div class="sub">${p.codigo||''} · ${p.medidas||''}</div></div><b>${fmt(p.precio)}</b></div><div class="chips"><span class="chip">Stock ${p.stock||0}</span><span class="chip">${p.terminacion||'sin terminación'}</span><span class="chip">${p.tiempo||'?' } días</span></div></div>`)}`}
window.filterCards=(cls,val)=>document.querySelectorAll('.'+cls).forEach(e=>e.style.display=e.dataset.q.includes(String(val).toLowerCase())?'block':'none');function q(...x){return x.join(' ').toLowerCase()}
function renderClientes(){let el=$('page-clientes');if(!el)return;el.innerHTML=`<div class="head"><h2>Clientes</h2><button class="btn p sm" onclick="openCliente()"><i class="ti ti-plus"></i>Nuevo</button></div>${list(state.clientes,c=>`<div class="li"><div class="info"><div class="name">${c.nombre}</div><div class="sub">${c.tel||''} · ${c.email||''}</div></div><button class="btn sm" onclick="openCliente('${c.id}')">Editar</button></div>`)}`}
function renderPresupuestos(){let el=$('page-presupuestos');if(!el)return;el.innerHTML=`<div class="head"><h2>Presupuestos</h2><button class="btn p sm" onclick="openPresupuesto()"><i class="ti ti-plus"></i>Nuevo</button></div>${list(state.presupuestos,p=>`<div class="li"><div class="info"><div class="name">${p.numero||''} · ${p.descripcion||'Presupuesto'}</div><div class="sub">${clienteName(p.clienteId)} · ${fmt(p.total)}</div></div><span class="badge b-${p.estado}">${p.estado}</span><button class="btn sm" onclick="viewPresupuesto('${p.id}')">Ver</button></div>`)}`}
function clienteName(id){return (state.clientes.find(c=>c.id===id)||{}).nombre||'Sin cliente'}
function renderProduccion(){let el=$('page-produccion');if(!el)return;let start=new Date();start.setDate(1);let days=new Date(start.getFullYear(),start.getMonth()+1,0).getDate();let cal='';for(let d=1;d<=days;d++){let fecha=start.getFullYear()+'-'+String(start.getMonth()+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');let tareas=state.ordenes.filter(o=>o.fechaInicio<=fecha&&o.fechaEntrega>=fecha);cal+=`<div class="day"><b>${d}</b>${tareas.map(t=>`<div class="task">${t.numero||''}</div>`).join('')}</div>`}el.innerHTML=`<div class="head"><h2>Producción</h2><button class="btn p sm" onclick="openOrden()"><i class="ti ti-plus"></i>Orden manual</button></div><div class="card"><b>Calendario mensual</b><div class="calgrid" style="margin-top:10px">${cal}</div></div>${list(state.ordenes,o=>`<div class="li"><div class="info"><div class="name">${o.numero||''} · ${o.producto||o.descripcion}</div><div class="sub">${o.cliente||''} · ${o.fechaInicio||''} → ${o.fechaEntrega||''}</div></div><span class="badge b-${o.estado}">${o.estado}</span><button class="btn sm" onclick="openOrden('${o.id}')">Editar</button></div>`)}`}
function renderInventario(){let el=$('page-inventario');if(!el)return;el.innerHTML=`<div class="head"><h2>Inventario</h2><button class="btn p sm" onclick="openMaterial()"><i class="ti ti-plus"></i>Material</button></div>${list(state.inventario,m=>`<div class="li"><div class="info"><div class="name">${m.nombre}</div><div class="sub">${m.cantidad||0} ${m.unidad||''} · mínimo ${m.minimo||0}</div></div><span class="badge">${Number(m.cantidad)<=Number(m.minimo||0)?'Bajo':'OK'}</span><button class="btn sm" onclick="openMaterial('${m.id}')">Editar</button></div>`)}`}
function renderCaja(){let el=$('page-caja');if(!el)return;let saldo=sum(state.caja,m=>m.tipo==='ingreso'?m.monto:-m.monto);el.innerHTML=`<div class="metrics"><div class="metric"><small>Saldo</small><strong>${fmt(saldo)}</strong></div><div class="metric"><small>Movimientos</small><strong>${state.caja.length}</strong></div></div><div class="head"><h2>Caja</h2><button class="btn p sm" onclick="openCaja()">Nuevo</button></div>${list(state.caja,m=>`<div class="li"><div class="info"><div class="name">${m.desc}</div><div class="sub">${m.fecha||''}</div></div><b style="color:${m.tipo==='ingreso'?'var(--accent)':'var(--danger)'}">${m.tipo==='ingreso'?'+':'-'}${fmt(m.monto)}</b></div>`)}`}
function renderGastos(){let el=$('page-gastos');if(!el)return;el.innerHTML=`<div class="head"><h2>Gastos</h2><button class="btn p sm" onclick="openGasto()">Nuevo</button></div>${list(state.gastos,g=>`<div class="li"><div class="info"><div class="name">${g.desc}</div><div class="sub">${g.cat||''} · ${g.fecha||''}</div></div><b style="color:var(--danger)">${fmt(g.monto)}</b></div>`)}`}
function renderUsuarios(){let el=$('page-usuarios');if(!el)return;el.innerHTML=`<div class="head"><h2>Usuarios</h2><button class="btn p sm" onclick="openUsuario()">Nuevo</button></div>${list(state.usuarios,u=>`<div class="li"><div class="info"><div class="name">${u.nombre||u.email}</div><div class="sub">${u.email} · ${u.rol}</div></div><button class="btn sm" onclick="openUsuario('${u.id}')">Editar</button></div>`)}`}
function renderActividad(){let el=$('page-actividad');if(!el)return;el.innerHTML=`<div class="head"><h2>Actividad</h2></div>${list(state.historial.slice().sort((a,b)=>b.fecha-a.fecha).slice(0,50),h=>`<div class="li"><div class="info"><div class="name">${h.action}</div><div class="sub">${h.usuario||''} · ${new Date(h.fecha).toLocaleString('es-AR')}</div></div></div>`)}`}
function renderConfig(){let el=$('page-config');if(!el)return;el.innerHTML=`<div class="head"><h2>Configuración</h2></div><div class="card"><b>Datos empresa</b><p style="color:var(--muted);margin-top:8px">Pendiente de vincular a colección configuración: logo, colores, textos de PDF, pie de página, teléfonos y datos comerciales.</p></div>`}
function makeOverlay(id,title,html,save){let o=document.createElement('div');o.className='overlay open';o.id=id;o.innerHTML=`<div class="sheet"><div class="sheet-title"><span>${title}</span><button class="close" onclick="closeOv('${id}')">×</button></div>${html}<div class="actions"><button class="btn" onclick="closeOv('${id}')">Cancelar</button><button class="btn p" onclick="${save}">Guardar</button></div></div>`;$('overlays').appendChild(o)}window.closeOv=id=>$(id)?.remove();
window.openProducto=id=>{let p=state.productos.find(x=>x.id===id)||{};productoFotos=p.fotos||[];makeOverlay('ov-prod',id?'Editar producto':'Nuevo producto',`<div class="grid2"><div class="frow"><label>Código</label><input id="prod-codigo" value="${p.codigo||nextCode('PR',state.productos)}"></div><div class="frow"><label>Nombre</label><input id="prod-nombre" value="${p.nombre||''}"></div></div><div class="frow"><label>Descripción corta</label><textarea id="prod-desc">${p.desc||''}</textarea></div><div class="grid2"><div class="frow"><label>Medidas</label><input id="prod-medidas" value="${p.medidas||''}" placeholder="120 x 60 x 45 cm"></div><div class="frow"><label>Categoría</label><input id="prod-cat" value="${p.categoria||''}"></div></div><div class="frow"><label>Materiales</label><textarea id="prod-materiales">${p.materiales||''}</textarea></div><div class="grid2"><div class="frow"><label>Terminación</label><input id="prod-terminacion" value="${p.terminacion||''}"></div><div class="frow"><label>Entrega domicilio</label><select id="prod-entrega"><option ${p.entrega==='si'?'selected':''} value="si">Sí</option><option ${p.entrega==='no'?'selected':''} value="no">No</option><option ${p.entrega==='consultar'?'selected':''} value="consultar">A consultar</option></select></div></div><div class="grid2"><div class="frow"><label>Stock</label><input id="prod-stock" type="number" value="${p.stock||0}"></div><div class="frow"><label>Demora días</label><input id="prod-tiempo" type="number" value="${p.tiempo||''}"></div></div><div class="slabel">Costos internos</div><div class="grid2"><div class="frow"><label>Material</label><input id="prod-cmat" type="number" value="${p.costoMaterial||0}"></div><div class="frow"><label>Mano obra</label><input id="prod-cmo" type="number" value="${p.costoMO||0}"></div></div><div class="grid2"><div class="frow"><label>Ganancia</label><input id="prod-gan" type="number" value="${p.ganancia||0}"></div><div class="frow"><label>Precio venta</label><input id="prod-precio" type="number" value="${p.precio||0}"></div></div><div class="frow"><label>Foto URL o base64</label><input id="prod-foto" value="${(p.fotos&&p.fotos[0])||''}"></div>`,`saveProducto('${id||''}')`)};
window.saveProducto=id=>{let data={codigo:$('prod-codigo').value,nombre:$('prod-nombre').value,desc:$('prod-desc').value,medidas:$('prod-medidas').value,categoria:$('prod-cat').value,materiales:$('prod-materiales').value,terminacion:$('prod-terminacion').value,entrega:$('prod-entrega').value,stock:+$('prod-stock').value,tiempo:+$('prod-tiempo').value,costoMaterial:+$('prod-cmat').value,costoMO:+$('prod-cmo').value,ganancia:+$('prod-gan').value,precio:+$('prod-precio').value,fotos:$('prod-foto').value?[$('prod-foto').value]:[]};if(!data.precio)data.precio=data.costoMaterial+data.costoMO+data.ganancia;id?upd('productos',id,data,()=>closeOv('ov-prod')):add('productos',data,()=>closeOv('ov-prod'))};
window.viewProducto=id=>{let p=state.productos.find(x=>x.id===id);if(!p)return;makeOverlay('ov-viewprod','Detalle producto',`<div class="thumb">${imgOf(p)}</div><div class="card"><b>${p.nombre}</b><div class="sub">${p.codigo} · ${p.medidas}</div><p style="margin-top:8px">${p.desc||''}</p><div class="chips"><span class="chip">${p.terminacion||''}</span><span class="chip">Stock ${p.stock||0}</span><span class="chip">${fmt(p.precio)}</span></div></div><div class="grid2"><button class="btn" onclick="closeOv('ov-viewprod');openProducto('${id}')">Editar producto</button><button class="btn d" onclick="del('productos','${id}');closeOv('ov-viewprod')">Eliminar</button></div>`,`closeOv('ov-viewprod')`);document.querySelector('#ov-viewprod .actions').remove()};
window.openCliente=id=>{let c=state.clientes.find(x=>x.id===id)||{};makeOverlay('ov-cli',id?'Editar cliente':'Nuevo cliente',`<div class="frow"><label>Nombre</label><input id="cli-nombre" value="${c.nombre||''}"></div><div class="grid2"><div class="frow"><label>Teléfono</label><input id="cli-tel" value="${c.tel||''}"></div><div class="frow"><label>Email</label><input id="cli-email" value="${c.email||''}"></div></div><div class="frow"><label>Notas</label><textarea id="cli-notas">${c.notas||''}</textarea></div><div class="card"><b>OCR captura</b><p style="color:var(--muted);margin-top:6px">Pendiente: integrar OCR para extraer nombre, teléfono y email de una captura.</p></div>`,`saveCliente('${id||''}')`)};window.saveCliente=id=>{let d={nombre:$('cli-nombre').value,tel:$('cli-tel').value,email:$('cli-email').value,notas:$('cli-notas').value};id?upd('clientes',id,d,()=>closeOv('ov-cli')):add('clientes',d,()=>closeOv('ov-cli'))};
window.openPresupuesto=id=>{let p=state.presupuestos.find(x=>x.id===id)||{};presupItems=p.items||[];pagoItems=p.pagos||[];makeOverlay('ov-pre',id?'Editar presupuesto':'Nuevo presupuesto',`<div class="frow"><label>Cliente</label><select id="pre-cliente"><option value="">Seleccionar</option>${state.clientes.map(c=>`<option ${p.clienteId===c.id?'selected':''} value="${c.id}">${c.nombre}</option>`).join('')}</select></div><div class="frow"><label>Descripción/proyecto</label><input id="pre-desc" value="${p.descripcion||''}"></div><div class="slabel">Productos catálogo</div><div class="search frow"><input id="pre-prod-search" placeholder="Buscar producto..." oninput="prodDrop(this.value)" onfocus="prodDrop(this.value)"><div class="drop" id="pre-prod-drop"></div></div><div id="pre-items"></div><div class="grid2"><div class="frow"><label>Servicio manual</label><input id="pre-serv-desc" placeholder="Ej: instalación"></div><div class="frow"><label>Monto</label><input id="pre-serv-monto" type="number"></div></div><button class="btn sm" onclick="addServicio()">Agregar servicio manual</button><div class="slabel">Estado y pagos</div><div class="grid2"><div class="frow"><label>Estado</label><select id="pre-estado"><option value="pendiente">Pendiente</option><option value="confirmado">Confirmado</option><option value="produccion">En producción</option><option value="finalizado">Finalizado</option><option value="entregado">Entregado</option><option value="cancelado">Cancelado</option></select></div><div class="frow"><label>Próximo pago</label><input id="pre-prox" type="date" value="${p.proxPago||today()}"></div></div><div class="frow"><label>Condiciones</label><textarea id="pre-cond">${p.condicion||'Presupuesto válido por 15 días.'}</textarea></div><div class="grid2"><div class="frow"><label>Entrega inicial</label><input id="pre-adel" type="number" value="${(p.pagos&&p.pagos[0]&&p.pagos[0].monto)||0}"></div><div class="frow"><label>Tipo pago</label><select id="pre-pago"><option>efectivo</option><option>transferencia</option><option>mercadopago</option><option>dolares</option><option>cheque</option></select></div></div><div class="card"><b>Total: <span id="pre-total">$0</span></b></div>`,`savePresupuesto('${id||''}')`);$('pre-estado').value=p.estado||'pendiente';renderPreItems()};
window.prodDrop=v=>{let d=$('pre-prod-drop');let arr=state.productos.filter(p=>q(p.codigo,p.nombre,p.categoria,p.terminacion).includes(String(v).toLowerCase())).slice(0,8);d.innerHTML=arr.map(p=>`<div class="opt" onclick="addProdToPre('${p.id}')"><b>${p.nombre}</b><div class="sub">${p.codigo||''} · ${fmt(p.precio)} · ${p.stock>0?'stock':'a fabricar'}</div></div>`).join('')||'<div class="opt">Sin resultados</div>';d.classList.add('open')};
window.addProdToPre=id=>{let p=state.productos.find(x=>x.id===id);if(!p)return;presupItems.push({tipo:'producto',productoId:id,codigo:p.codigo,nombre:p.nombre,descripcion:p.desc,medidas:p.medidas,terminacion:p.terminacion,cantidad:1,precio:p.precio,tiempo:p.stock>0?'En stock':(p.tiempo||'A consultar')+' días'});$('pre-prod-drop').classList.remove('open');$('pre-prod-search').value='';if(!$('pre-desc').value)$('pre-desc').value=p.nombre;renderPreItems()};
window.addServicio=()=>{presupItems.push({tipo:'servicio',nombre:$('pre-serv-desc').value||'Servicio',cantidad:1,precio:+$('pre-serv-monto').value||0});$('pre-serv-desc').value='';$('pre-serv-monto').value='';renderPreItems()};window.rmPreItem=i=>{presupItems.splice(i,1);renderPreItems()};
function renderPreItems(){let el=$('pre-items');if(!el)return;el.innerHTML=presupItems.map((x,i)=>`<div class="prodline"><div class="info"><b>${x.nombre}</b><div class="sub">${x.codigo||x.tipo} · ${x.medidas||''} · ${fmt(x.precio)}</div></div><button class="btn sm d" onclick="rmPreItem(${i})">×</button></div>`).join('')||'<div class="sub">Sin productos agregados</div>';let total=sum(presupItems,x=>x.precio*x.cantidad);$('pre-total').textContent=fmt(total)}
window.savePresupuesto=id=>{let total=sum(presupItems,x=>x.precio*x.cantidad),estado=$('pre-estado').value;let d={numero:id?(state.presupuestos.find(x=>x.id===id)||{}).numero:nextCode('P',state.presupuestos),clienteId:$('pre-cliente').value,descripcion:$('pre-desc').value,items:presupItems,total,estado,condicion:$('pre-cond').value,proxPago:$('pre-prox').value,pagos:+$('pre-adel').value?[{tipo:$('pre-pago').value,monto:+$('pre-adel').value,fecha:today()}]:[]};let old=id?state.presupuestos.find(x=>x.id===id):null;let after=pid=>{closeOv('ov-pre');if(estado==='confirmado'&&(!old||old.estado!=='confirmado')){crearRecibo(pid,d);crearOrdenes(pid,d)}openBudgetPdf(pid,d)};id?upd('presupuestos',id,d,()=>after(id)):add('presupuestos',d,after)};
function crearRecibo(pid,p){if(!p.pagos.length)return;add('recibos',{numero:nextCode('R',state.recibos),presupuestoId:pid,clienteId:p.clienteId,total:p.total,monto:p.pagos[0].monto,saldo:p.total-p.pagos[0].monto,tipo:p.pagos[0].tipo,fecha:today()})}
function crearOrdenes(pid,p){p.items.filter(i=>i.tipo==='producto').forEach(i=>{let ini=today(),fin=addDays(ini,parseInt(i.tiempo)||7);add('ordenes',{numero:nextCode('OP',state.ordenes),presupuestoId:pid,cliente:clienteName(p.clienteId),producto:i.nombre,descripcion:i.descripcion||i.nombre,materiales:(state.productos.find(x=>x.id===i.productoId)||{}).materiales||'',terminacion:i.terminacion,fechaInicio:ini,fechaEntrega:fin,estado:'pendiente'})})}
function addDays(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function openBudgetPdf(id,p){let c=state.clientes.find(x=>x.id===p.clienteId)||{};let rows=(p.items||[]).map(i=>`<tr><td>${i.nombre}<br><small>${i.medidas||''} ${i.terminacion||''}</small></td><td>${i.cantidad||1}</td><td>${fmt(i.precio)}</td></tr>`).join('');currentDocText=`Presupuesto ${p.numero}\nCliente: ${c.nombre||''}\nTotal: ${fmt(p.total)}`;$('pdf-content').innerHTML=`<div class="PR"><div class="PRhead"><div><h1>Un Atelier</h1><small>Fede Gomez Friera · 351 233-3230</small></div><div><b>${p.numero}</b><br><small>${today()}</small></div></div><div class="card"><small>Cliente</small><br><b>${c.nombre||'Sin cliente'}</b><br><small>${c.tel||''} ${c.email||''}</small></div><p>${p.descripcion||''}</p><table><thead><tr><th>Producto / Servicio</th><th>Cant.</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table><div class="PRtotal"><span>Total</span><strong>${fmt(p.total)}</strong></div><p style="margin-top:14px;color:#555">${p.condicion||''}</p></div>`;$('pdf').classList.add('open')}
window.viewPresupuesto=id=>openBudgetPdf(id,state.presupuestos.find(x=>x.id===id));window.closePdf=()=>$('pdf').classList.remove('open');window.shareDoc=()=>navigator.share?navigator.share({text:currentDocText}).catch(()=>{}):navigator.clipboard.writeText(currentDocText).then(()=>toast('Copiado'));window.printDoc=()=>{let w=window.open('','_blank');w.document.write('<html><body>'+$('pdf-content').innerHTML+'<script>print()<\/script></body></html>');w.document.close()};
window.openOrden=id=>{let o=state.ordenes.find(x=>x.id===id)||{};makeOverlay('ov-ord',id?'Editar orden':'Orden producción',`<div class="frow"><label>Producto / trabajo</label><input id="ord-prod" value="${o.producto||o.descripcion||''}"></div><div class="frow"><label>Materiales</label><textarea id="ord-mat">${o.materiales||''}</textarea></div><div class="grid2"><div class="frow"><label>Inicio</label><input id="ord-ini" type="date" value="${o.fechaInicio||today()}"></div><div class="frow"><label>Entrega</label><input id="ord-fin" type="date" value="${o.fechaEntrega||today()}"></div></div><div class="frow"><label>Estado</label><select id="ord-est"><option>pendiente</option><option>proceso</option><option>pausado</option><option>finalizado</option></select></div>`,`saveOrden('${id||''}')`);$('ord-est').value=o.estado||'pendiente'};window.saveOrden=id=>{let d={numero:id?(state.ordenes.find(x=>x.id===id)||{}).numero:nextCode('OP',state.ordenes),producto:$('ord-prod').value,materiales:$('ord-mat').value,fechaInicio:$('ord-ini').value,fechaEntrega:$('ord-fin').value,estado:$('ord-est').value};id?upd('ordenes',id,d,()=>closeOv('ov-ord')):add('ordenes',d,()=>closeOv('ov-ord'))};
window.openMaterial=id=>{let m=state.inventario.find(x=>x.id===id)||{};makeOverlay('ov-mat',id?'Editar material':'Material',`<div class="frow"><label>Nombre</label><input id="mat-nom" value="${m.nombre||''}"></div><div class="grid2"><div class="frow"><label>Cantidad</label><input id="mat-cant" type="number" value="${m.cantidad||0}"></div><div class="frow"><label>Unidad</label><input id="mat-uni" value="${m.unidad||'u'}"></div></div><div class="frow"><label>Stock mínimo</label><input id="mat-min" type="number" value="${m.minimo||0}"></div>`,`saveMaterial('${id||''}')`)};window.saveMaterial=id=>{let d={nombre:$('mat-nom').value,cantidad:+$('mat-cant').value,unidad:$('mat-uni').value,minimo:+$('mat-min').value};id?upd('inventario',id,d,()=>closeOv('ov-mat')):add('inventario',d,()=>closeOv('ov-mat'))};
window.openCaja=()=>makeOverlay('ov-caja','Movimiento caja',`<div class="frow"><label>Tipo</label><select id="cj-tipo"><option value="ingreso">Ingreso</option><option value="egreso">Egreso</option></select></div><div class="frow"><label>Descripción</label><input id="cj-desc"></div><div class="grid2"><div class="frow"><label>Monto</label><input id="cj-monto" type="number"></div><div class="frow"><label>Fecha</label><input id="cj-fecha" type="date" value="${today()}"></div></div>`,`add('caja',{tipo:$('cj-tipo').value,desc:$('cj-desc').value,monto:+$('cj-monto').value,fecha:$('cj-fecha').value},()=>closeOv('ov-caja'))`);
window.openGasto=()=>makeOverlay('ov-gasto','Nuevo gasto',`<div class="frow"><label>Descripción</label><input id="g-desc"></div><div class="grid2"><div class="frow"><label>Monto</label><input id="g-monto" type="number"></div><div class="frow"><label>Fecha</label><input id="g-fecha" type="date" value="${today()}"></div></div><div class="frow"><label>Categoría</label><input id="g-cat"></div>`,`add('gastos',{desc:$('g-desc').value,monto:+$('g-monto').value,fecha:$('g-fecha').value,cat:$('g-cat').value},()=>closeOv('ov-gasto'))`);
window.openUsuario=id=>{let u=state.usuarios.find(x=>x.id===id)||{};makeOverlay('ov-user',id?'Editar usuario':'Usuario',`<div class="frow"><label>Nombre</label><input id="u-nom" value="${u.nombre||''}"></div><div class="frow"><label>Email</label><input id="u-email" value="${u.email||''}"></div><div class="frow"><label>Rol</label><select id="u-rol"><option value="admin">Administrador</option><option value="produccion">Encargado producción</option></select></div><div class="card"><b>Nota</b><p style="color:var(--muted);margin-top:6px">El usuario se registra con email/contraseña. Desde acá asignás el rol para limitar el acceso.</p></div>`,`saveUsuario('${id||''}')`);$('u-rol').value=u.rol||'produccion'};window.saveUsuario=id=>{let rol=$('u-rol').value,d={nombre:$('u-nom').value,email:$('u-email').value,rol,permisos:roles[rol]};id?upd('usuarios',id,d,()=>closeOv('ov-user')):add('usuarios',d,()=>closeOv('ov-user'))};
});
</script>
</body>
