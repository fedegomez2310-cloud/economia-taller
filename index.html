<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Economía del Taller</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);font-size:14px}
:root{--accent:#1D9E75;--danger:#E24B4A;--warn:#EF9F27;--info:#378ADD;--bg:#fff;--bg2:#f6f6f4;--border:rgba(0,0,0,.1);--text:#1a1a1a;--muted:#666}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#111;--border:rgba(255,255,255,.1);--text:#f0f0f0;--muted:#999}}
button,input,select,textarea{font-family:inherit}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 14px;border:.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-weight:600;font-size:13px;cursor:pointer;min-height:38px;transition:opacity .1s}
.btn:active{opacity:.7}.btn.p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.d{color:var(--danger);border-color:var(--danger)}.btn.w{color:var(--warn);border-color:var(--warn)}
.btn.sm{font-size:12px;padding:6px 10px;min-height:30px}.btn.full{width:100%;justify-content:center}
.btn.xs{font-size:11px;padding:4px 8px;min-height:24px;border-radius:6px}
/* Auth */
.auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.authbox{width:min(360px,100%);border:.5px solid var(--border);border-radius:18px;padding:28px 22px;text-align:center;background:var(--bg)}
.tabs{display:flex;background:var(--bg2);padding:3px;border-radius:8px;margin:16px 0}
.tabs button{flex:1;border:0;background:transparent;color:var(--muted);padding:8px;border-radius:6px;font-weight:500}
.tabs button.active{background:var(--bg);color:var(--text)}
/* Layout */
.app{display:none;min-height:100vh;flex-direction:column}
.top{position:sticky;top:0;z-index:20;background:var(--bg);display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:.5px solid var(--border)}
.nav{position:sticky;top:53px;z-index:19;display:flex;overflow:auto;background:var(--bg);border-bottom:.5px solid var(--border);scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{flex-shrink:0;border:0;background:transparent;color:var(--muted);padding:9px 11px;font-size:11px;font-weight:500;border-bottom:2px solid transparent;display:flex;gap:3px;align-items:center;white-space:nowrap}
.nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
.page{display:none;padding:14px;max-width:640px;margin:0 auto;width:100%}.page.active{display:block}
/* Forms */
.frow{margin-bottom:11px;text-align:left}
.frow label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;font-weight:600}
.frow input,.frow select,.frow textarea{width:100%;border:.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);padding:10px 12px;font-size:15px;outline:none}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* Cards */
.card{background:var(--bg);border:.5px solid var(--border);border-radius:12px;padding:13px;margin-bottom:10px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.head h2{font-size:16px;font-weight:700}
/* Metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:var(--bg);border:.5px solid var(--border);border-radius:10px;padding:11px}
.metric small{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.metric strong{font-size:17px;font-weight:700}
.metric .cnt{font-size:11px;color:var(--muted);margin-top:1px}
/* List */
.li{display:flex;gap:8px;align-items:flex-start;border-bottom:.5px solid var(--border);padding:10px 0}
.li:last-child{border-bottom:0}.li .info{flex:1;min-width:0}
.li .name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .sub{font-size:11px;color:var(--muted);margin-top:2px}
/* Badges */
.badge{font-size:10px;padding:3px 7px;border-radius:99px;font-weight:700;white-space:nowrap}
.b-pendiente{background:#FAEEDA;color:#633806}.b-confirmado{background:#EAF3DE;color:#27500A}
.b-produccion{background:#DCEBFA;color:#0B416E}.b-finalizado{background:#E1F5EE;color:#085041}
.b-entregado{background:#EDE9FE;color:#4C1D95}.b-cancelado{background:#FCEBEB;color:#791F1F}
.b-stock{background:#EAF3DE;color:#27500A}.b-sinstock{background:#FCEBEB;color:#791F1F}
.b-fabricar{background:#DCEBFA;color:#0B416E}.b-reservado{background:#FAEEDA;color:#633806}
.b-vendido{background:#F1EFE8;color:#444}
/* Overlay / Sheet */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{width:100%;max-width:580px;max-height:93vh;overflow:auto;background:var(--bg);border-radius:20px 20px 0 0;padding:18px 18px 50px}
.sheet-title{font-size:16px;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.slabel{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 7px}
.close{border:0;background:transparent;color:var(--muted);font-size:24px;cursor:pointer;min-width:40px}
.sactions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:.5px solid var(--border)}
/* Toast */
.toast{display:none;position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111;color:#fff;border-radius:18px;padding:9px 16px;z-index:300;font-size:13px;pointer-events:none}
/* Product thumb */
.thumb{border-radius:10px;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:28px;cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:contain;display:block}
.thumbsm{width:64px;height:64px;flex-shrink:0;border-radius:8px;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.thumbsm img{width:100%;height:100%;object-fit:contain}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.chip{font-size:10px;background:var(--bg2);border-radius:99px;padding:3px 8px;color:var(--muted)}
/* Product search drop */
.search{position:relative}
.drop{position:absolute;left:0;right:0;top:100%;background:var(--bg);border:.5px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.13);border-radius:10px;z-index:150;max-height:220px;overflow:auto;display:none}
.drop.open{display:block}.drop .opt{padding:10px;border-bottom:.5px solid var(--border);cursor:pointer}
.drop .opt:hover{background:var(--bg2)}.drop .opt:last-child{border-bottom:0}
.prodline{display:flex;gap:8px;align-items:center;background:var(--bg2);border-radius:10px;padding:10px;margin-bottom:7px}
.prodline .info{flex:1;min-width:0}
/* PDF overlay */
.pdf{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:flex-start;justify-content:center;padding:12px;overflow:auto}
.pdf.open{display:flex}
.pdfbox{background:#fff;color:#111;width:100%;max-width:580px;border-radius:14px;overflow:hidden;margin:auto}
.pdfcontent{max-height:66vh;overflow:auto}
/* PDF interno */
.PR{font-family:Georgia,serif;padding:26px 22px;background:#fff;color:#111}
.PRhead{display:flex;justify-content:space-between;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:16px}
.PR h1{font-size:18px;letter-spacing:1px;text-transform:uppercase}
.PR table{width:100%;border-collapse:collapse;margin:12px 0}
.PR th{font-size:9px;text-transform:uppercase;color:#777;text-align:left;border-bottom:1px solid #ddd;padding-bottom:4px}
.PR td{font-size:13px;border-bottom:1px solid #eee;padding:7px 0;vertical-align:top}
.PR td:last-child{text-align:right;font-weight:700}
.PRtotal{display:flex;justify-content:space-between;align-items:baseline;border-top:2px solid #111;padding-top:12px;margin-top:12px}
.PRtotal strong{font-size:26px}
/* Calendar */
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day{min-height:56px;background:var(--bg2);border-radius:7px;padding:5px;font-size:10px}
.task{margin-top:3px;border-radius:4px;padding:2px 4px;background:#DCEBFA;color:#0B416E;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
/* Lightbox */
.lbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;align-items:center;justify-content:center;cursor:zoom-out}
.lbox.open{display:flex}.lbox img{max-width:95vw;max-height:95vh;border-radius:8px;object-fit:contain}
/* Money input */
.money-wrap{position:relative;display:flex;align-items:center}
.money-wrap .sign{position:absolute;left:11px;font-size:15px;color:var(--muted);pointer-events:none}
.money-wrap input{padding-left:24px}
/* Status row */
.status-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="lbox" id="lbox" onclick="$('lbox').classList.remove('open')"><img id="lbox-img" src="" alt="foto"></div>

<!-- AUTH -->
<div class="auth" id="auth-screen">
<div class="authbox">
  <div style="font-size:34px">🔧</div>
  <h1 style="font-size:20px;margin-top:4px">Economía del Taller</h1>
  <p style="color:var(--muted);font-size:12px;margin-top:4px">ERP · Un Atelier / Fede Gomez Friera</p>
  <div class="tabs">
    <button class="active" onclick="setAuthMode('login')">Ingresar</button>
    <button onclick="setAuthMode('register')">Registrarse</button>
  </div>
  <div id="auth-err" style="min-height:16px;color:var(--danger);font-size:12px;margin-bottom:8px"></div>
  <div class="frow"><label>Email</label><input id="a-email" type="email" autocomplete="email"></div>
  <div class="frow"><label>Contraseña</label><input id="a-pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()"></div>
  <button class="btn p full" id="auth-btn" onclick="doAuth()">Ingresar</button>
</div>
</div>

<!-- APP -->
<div class="app" id="app-screen">
  <div class="top">
    <div>
      <b style="font-size:14px">🔧 Economía del Taller</b>
      <div id="user-email" style="font-size:10px;color:var(--muted)"></div>
    </div>
    <button class="btn sm d" onclick="doLogout()"><i class="ti ti-logout"></i></button>
  </div>
  <nav class="nav" id="nav"></nav>
  <main id="pages"></main>
</div>

<!-- PDF -->
<div class="pdf" id="pdf">
  <div class="pdfbox">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #eee">
      <b id="pdf-title">Documento</b>
      <button class="close" onclick="closePdf()">×</button>
    </div>
    <div class="pdfcontent" id="pdf-content"></div>
    <div style="display:flex;gap:8px;padding:10px 14px;border-top:1px solid #eee">
      <button class="btn full" onclick="closePdf()">Cerrar</button>
      <button class="btn p full" onclick="shareDoc()"><i class="ti ti-share"></i>Compartir</button>
      <button class="btn full" onclick="printDoc()"><i class="ti ti-printer"></i>PDF</button>
    </div>
  </div>
</div>

<div id="overlays"></div>

<script>
window.addEventListener('load',function(){
// ── Firebase ──────────────────────────────────────────────────────────────
firebase.initializeApp({apiKey:'AIzaSyBl-3tb0qqJL7l-1TThOLljRhn9MsoOQQM',authDomain:'economia-del-taller.firebaseapp.com',projectId:'economia-del-taller',storageBucket:'economia-del-taller.firebasestorage.app',messagingSenderId:'999276079590',appId:'1:999276079590:web:515dee9e869a33f5430e27'});
const auth=firebase.auth(),db=firebase.firestore();

// ── Helpers ───────────────────────────────────────────────────────────────
window.$=id=>document.getElementById(id);
const fmt=n=>'$ '+Math.round(Number(n||0)).toLocaleString('es-AR');
const fmtInput=n=>Math.round(Number(n||0)).toLocaleString('es-AR');
const parseM=s=>parseInt(String(s||'').replace(/\D/g,''))||0;
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>auth.currentUser&&auth.currentUser.uid;
const addDays=(d,n)=>{let x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)};

// ── State ─────────────────────────────────────────────────────────────────
let authMode='login';
let state={productos:[],clientes:[],presupuestos:[],gastos:[],caja:[],ordenes:[],usuarios:[],inventario:[],historial:[],recibos:[]};
let unsubs=[],currentRole='admin',currentDocText='',presupItems=[];

const CATS=['Mesas','Sillas','Muebles','Aberturas','Postigones','Puertas','Objetos','Iluminación','Herrería','Carpintería','Otros'];
const ESTADOS_PRE=['pendiente','confirmado','produccion','finalizado','entregado','cancelado'];
const ESTADOS_PROD=['stock','sinstock','fabricar','reservado','vendido'];
const MEDIOS=['Pesos efectivo','Dólares','Mercado Pago','Transferencia','Cheque','Otro'];
const CATS_GASTO=['Materiales','Mano de obra','Herramientas','Transporte','Servicios','Marketing','Impuestos','Alquiler','Otro'];

const roles={
  admin:['dashboard','stock','productos','clientes','presupuestos','produccion','inventario','caja','gastos','reportes','usuarios','actividad','config'],
  produccion:['produccion','stock','inventario','actividad']
};
const PAGES=[
  ['dashboard','Tablero','ti-layout-dashboard'],
  ['stock','Stock','ti-packages'],
  ['productos','Productos','ti-box'],
  ['clientes','Clientes','ti-users'],
  ['presupuestos','Presupuestos','ti-receipt'],
  ['produccion','Producción','ti-calendar-cog'],
  ['inventario','Inventario','ti-tool'],
  ['caja','Caja','ti-wallet'],
  ['gastos','Gastos','ti-arrow-up-circle'],
  ['usuarios','Usuarios','ti-user-cog'],
  ['actividad','Actividad','ti-history'],
  ['reportes','Reportes','ti-chart-bar'],
  ['config','Config','ti-settings'],
];

// ── Utilities ─────────────────────────────────────────────────────────────
function toast(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',2300)}
function coll(c){return db.collection('users').doc(uid()).collection(c)}
function log(action,tipo,id){if(!uid())return;coll('historial').add({action,tipo,itemId:id||'',usuario:auth.currentUser.email,fecha:Date.now()}).catch(()=>{})}
function addDoc2(c,d,cb){coll(c).add({...d,createdAt:Date.now(),updatedAt:Date.now()}).then(r=>{log('Creó '+c,c,r.id);toast('Guardado ✓');cb&&cb(r.id)}).catch(e=>toast('Error: '+e.message))}
function updDoc(c,id,d,cb){coll(c).doc(id).update({...d,updatedAt:Date.now()}).then(()=>{log('Editó '+c,c,id);toast('Actualizado ✓');cb&&cb()}).catch(e=>toast('Error: '+e.message))}
function delDoc(c,id,cb){coll(c).doc(id).delete().then(()=>{log('Eliminó '+c,c,id);toast('Eliminado');cb&&cb()}).catch(e=>toast('Error: '+e.message))}
function nextCode(prefix,arr){let max=0;arr.forEach(x=>{let m=String(x.codigo||x.numero||'').match(/(\d+)/);if(m)max=Math.max(max,parseInt(m[1]))});return prefix+'-'+String(max+1).padStart(4,'0')}
function can(p){return (roles[currentRole]||roles.admin).includes(p)}
function sum(a,f){return a.reduce((s,x)=>s+Number(f(x)||0),0)}
function clienteName(id){return (state.clientes.find(c=>c.id===id)||{}).nombre||'Sin cliente'}
function presupDesc(id){let p=state.presupuestos.find(x=>x.id===id);return p?(p.numero+' · '+clienteName(p.clienteId)):''}
function imgOf(p){return (p.fotos&&p.fotos[0])?`<img src="${esc(p.fotos[0])}" loading="lazy">`:'<i class="ti ti-photo"></i>'}
function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function moneyInput(id,val,oninputFn){
  return `<div class="money-wrap"><span class="sign">$</span><input type="text" inputmode="numeric" id="${id}" value="${fmtInput(val)}" oninput="${oninputFn||''}(this)" onfocus="selAll(this)" onblur="blurMoney(this)"></div>`;
}
window.selAll=el=>{setTimeout(()=>el.select(),50)};
window.blurMoney=el=>{let v=parseM(el.value);el.value=v?fmtInput(v):'';};
window.fmtMoneyInput=el=>{let v=parseM(el.value);el.value=v?fmtInput(v):'';};
function getM(id){return parseM($(id)&&$(id).value)}

// ── Auth ──────────────────────────────────────────────────────────────────
window.setAuthMode=m=>{authMode=m;document.querySelectorAll('.tabs button').forEach((b,i)=>b.classList.toggle('active',['login','register'][i]===m));$('auth-btn').textContent=m==='login'?'Ingresar':'Crear cuenta'};
window.doAuth=()=>{let e=$('a-email').value.trim(),p=$('a-pass').value;if(!e||!p)return $('auth-err').textContent='Completá email y contraseña';(authMode==='login'?auth.signInWithEmailAndPassword(e,p):auth.createUserWithEmailAndPassword(e,p)).catch(x=>$('auth-err').textContent=x.message)};
window.doLogout=()=>{unsubs.forEach(u=>u());unsubs=[];auth.signOut()};

auth.onAuthStateChanged(async u=>{
  if(!u){$('auth-screen').style.display='flex';$('app-screen').style.display='none';return}
  $('auth-screen').style.display='none';$('app-screen').style.display='flex';
  $('user-email').textContent=u.email;
  await loadRole();initListeners();buildNav();render();
});

async function loadRole(){
  let qs=await coll('usuarios').where('email','==',auth.currentUser.email).limit(1).get();
  if(qs.empty){currentRole='admin';await coll('usuarios').add({nombre:'Administrador',email:auth.currentUser.email,rol:'admin',permisos:roles.admin,createdAt:Date.now()})}
  else currentRole=qs.docs[0].data().rol||'admin';
}

function initListeners(){
  unsubs.forEach(u=>u());unsubs=[];
  Object.keys(state).forEach(c=>unsubs.push(coll(c).onSnapshot(s=>{state[c]=s.docs.map(d=>({id:d.id,...d.data()}));render()})));
}

function buildNav(){
  let n=$('nav');n.innerHTML='';
  PAGES.filter(p=>can(p[0])).forEach((p,i)=>{
    let b=document.createElement('button');
    b.innerHTML=`<i class="ti ${p[2]}"></i>${p[1]}`;
    b.onclick=()=>showPage(p[0]);
    if(i===0)b.classList.add('active');
    n.appendChild(b);
  });
  $('pages').innerHTML=PAGES.filter(p=>can(p[0])).map((p,i)=>`<section class="page ${i===0?'active':''}" id="page-${p[0]}"></section>`).join('');
}

window.showPage=id=>{
  if(!can(id))return toast('Sin permiso');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  $('page-'+id)&&$('page-'+id).classList.add('active');
  let label=(PAGES.find(p=>p[0]===id)||[])[1]||'';
  [...($('nav').children||[])].find(b=>b.textContent.trim().includes(label))?.classList.add('active');
  render();
};

// ── RENDER ALL ────────────────────────────────────────────────────────────
function render(){
  if(!uid())return;
  renderDashboard();renderStock();renderProductos();renderClientes();renderPresupuestos();
  renderProduccion();renderInventario();renderCaja();renderGastos();
  renderUsuarios();renderActividad();renderReportes();renderConfig();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashboard(){
  let el=$('page-dashboard');if(!el)return;
  let caja=sum(state.caja,m=>m.tipo==='ingreso'?m.monto:-m.monto);
  let stockBajo=state.inventario.filter(x=>Number(x.cantidad)<=Number(x.minimo||0)).length;
  let byEstado=(e)=>state.presupuestos.filter(p=>p.estado===e);
  let metricPre=(e,label,color)=>{let arr=byEstado(e);return `<div class="metric"><small>${label}</small><strong style="color:${color}">${fmt(sum(arr,p=>p.total))}</strong><div class="cnt">${arr.length} presupuesto${arr.length!==1?'s':''}</div></div>`};
  el.innerHTML=`
  <div class="metrics">
    <div class="metric"><small>Saldo caja</small><strong style="color:var(--accent)">${fmt(caja)}</strong></div>
    <div class="metric"><small>Stock bajo</small><strong style="color:var(--danger)">${stockBajo}</strong></div>
  </div>
  <div class="card"><b style="font-size:13px">Presupuestos por estado</b>
  <div class="metrics" style="margin-top:10px;margin-bottom:0">
    ${metricPre('pendiente','Pendientes','var(--warn)')}
    ${metricPre('confirmado','Confirmados','var(--accent)')}
    ${metricPre('produccion','En producción','var(--info)')}
    ${metricPre('finalizado','Finalizados','#085041')}
    ${metricPre('entregado','Entregados','#4C1D95')}
    ${metricPre('cancelado','Cancelados','var(--danger)')}
  </div></div>
  <div class="card"><b>Próximas entregas</b>

  let totalValor=sum(disponibles,p=>(p.stock||0)*(p.precio||0));
  let enStock=disponibles.length;

    <div class="metric"><small>Productos cargados</small><strong>${state.productos.length}</strong></div>
    <div class="metric"><small>En stock</small><strong style="color:var(--accent)">${enStock}</strong></div>

window.calcProdPrecio=el=>{
  fmtMoneyInput(el);
  let mat=getM('prod-cmat'),mo=getM('prod-cmo'),gan=getM('prod-gan');
  let tot=mat+mo+gan;
  if($('prod-precio'))$('prod-precio').value=tot?fmtInput(tot):'';
  if($('prod-precio-info'))$('prod-precio-info').textContent=tot?`Costo: ${fmt(mat+mo)} · Ganancia: ${fmt(gan)} · Precio: ${fmt(tot)}`:'';
};
window.saveProducto=id=>{
  let nombre=($('prod-nombre')||{}).value;if(!nombre)return toast('Ingresá el nombre');
  let cat=$('prod-cat').value==='_nueva'?($('nueva-cat')&&$('nueva-cat').value||'Otros'):$('prod-cat').value;
  let est=$('prod-estado').value;
  let alto=+$('prod-alto').value,ancho=+$('prod-ancho').value,prof=+$('prod-prof').value,u=$('prod-unidad').value;
  let partes=[];if(alto&&ancho)partes.push(`${alto} × ${ancho}`);if(prof)partes.push(`× ${prof}`);
  let medidas=partes.join(' ')+(partes.length?' '+u:'');
  let data={codigo:$('prod-codigo').value,nombre,desc:$('prod-desc').value,categoria:cat,estado:est,
    alto,ancho,prof,unidad:u,medidas,materiales:$('prod-materiales').value,terminacion:$('prod-terminacion').value,
    entrega:$('prod-entrega').value,stock:est==='sinstock'?0:+$('prod-stock').value,
    tiempo:+$('prod-tiempo').value||null,costoMaterial:getM('prod-cmat'),costoMO:getM('prod-cmo'),
    ganancia:getM('prod-gan'),precio:getM('prod-precio'),fotos:$('prod-foto').value?[$('prod-foto').value]:[]};
  id?updDoc('productos',id,data,()=>closeOv('ov-prod')):addDoc2('productos',data,()=>closeOv('ov-prod'));
};

window.savePresupuesto=id=>{
  let fechaEntrega=$('pre-fecha-entrega').value;
  if(!fechaEntrega)return toast('La fecha de entrega es obligatoria');
  let total=presupItems.reduce((s,x)=>s+x.precio*x.cantidad,0);
  let estado=$('pre-estado').value;
  let adel=getM('pre-adel');
  let d={numero:id?(state.presupuestos.find(x=>x.id===id)||{}).numero||nextCode('P',state.presupuestos):nextCode('P',state.presupuestos),clienteId:$('pre-cliente').value,descripcion:$('pre-desc').value,emisor:$('pre-emisor').value,items:presupItems,total,estado,fechaEntrega,condicion:$('pre-cond').value,proxPago:$('pre-prox').value,validez:$('pre-validez').value,pagos:adel?[{tipo:$('pre-pago').value,monto:adel,fecha:today()}]:[]};
  let old=id?state.presupuestos.find(x=>x.id===id):null;
  let after=pid=>{
    closeOv('ov-pre');
    if(estado==='confirmado'&&(!old||old.estado!=='confirmado')){if(adel)crearRecibo(pid,d);crearOrdenes(pid,d)}
    openBudgetPdf(pid,d);
  };
  id?updDoc('presupuestos',id,d,()=>after(id)):addDoc2('presupuestos',d,after);
};
function crearRecibo(pid,p){
  addDoc2('recibos',{numero:nextCode('R',state.recibos),presupuestoId:pid,clienteId:p.clienteId,total:p.total,monto:p.pagos[0].monto,saldo:p.total-p.pagos[0].monto,tipo:p.pagos[0].tipo,fecha:today()});
}
function crearOrdenes(pid,p){
  p.items.filter(i=>i.tipo==='producto').forEach(i=>{
    let ini=p.fechaEntrega||today();
    let horas=i.horasFab||0;
    let dias=Math.max(1,Math.ceil(horas/8));
    let fin=p.fechaEntrega||addDays(ini,dias);
    addDoc2('ordenes',{numero:nextCode('OP',state.ordenes),presupuestoId:pid,cliente:clienteName(p.clienteId),producto:i.nombre,descripcion:i.descripcion||i.nombre,materiales:(state.productos.find(x=>x.id===i.productoId)||{}).materiales||'',terminacion:i.terminacion,horasFab:i.horasFab||0,fechaInicio:ini,fechaEntrega:fin,estado:'pendiente'});
  });
}

    <div style="display:flex;gap:8px;margin-top:8px;font-size:10px">
      <span style="background:#DCEBFA;color:#0B416E;padding:2px 6px;border-radius:4px">≤8h</span>
      <span style="background:#FAEEDA;color:#633806;padding:2px 6px;border-radius:4px">≤16h</span>
      <span style="background:#FCEBEB;color:#791F1F;padding:2px 6px;border-radius:4px">&gt;16h</span>

  makeOverlay('ov-gasto','Nuevo gasto',`

  <div class="grid2">
    <div class="frow"><label>Monto</label>${moneyInput('g-monto',0,'fmtMoneyInput')}</div>
    <div class="frow"><label>Fecha</label><input id="g-fecha" type="date" value="${today()}"></div>
  </div>
  <div class="frow"><label>Categoría</label><select id="g-cat">${CATS_GASTO.map(c=>`<option>${c}</option>`).join('')}</select></div>
  <div class="frow"><label>Asociar a</label><select id="g-asoc" onchange="onGastoAsoc(this.value)"><option value="general">Gasto general</option><option value="presupuesto">Presupuesto</option></select></div>
  <div id="g-pre-wrap" style="display:none" class="frow"><label>Presupuesto</label><select id="g-pre"><option value="">Seleccionar</option>${preOpts}</select></div>
  <div class="sactions"><button class="btn" onclick="closeOv('ov-gasto')">Cancelar</button><button class="btn p" onclick="saveGasto()">Guardar</button></div>`,null,false,true);
};
window.onGastoAsoc=v=>{if($('g-pre-wrap'))$('g-pre-wrap').style.display=v==='presupuesto'?'block':'none'};
window.saveGasto=()=>{
  let preId=$('g-asoc').value==='presupuesto'?$('g-pre').value:'';
  let preDesc=preId?presupDesc(preId):'';
  let d={desc:$('g-desc').value,monto:getM('g-monto'),fecha:$('g-fecha').value,cat:$('g-cat').value,presupuestoId:preId,presupuestoDesc:preDesc};
  if(!d.desc||!d.monto)return toast('Completá descripción y monto');
  addDoc2('gastos',d,()=>closeOv('ov-gasto'));
};

window.saveUsuario=id=>{
  let rol=$('u-rol').value;

  id?updDoc('usuarios',id,d,()=>closeOv('ov-user')):addDoc2('usuarios',d,()=>closeOv('ov-user'));

// ── REPORTES ─────────────────────────────────────────────────────────────
function renderReportes(){
  let el=$('page-reportes');if(!el)return;
  el.innerHTML=`
  <div class="head"><h2>Reportes</h2></div>
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn sm" id="rp-sem" onclick="setReportePeriodo('semana')">Esta semana</button>
    <button class="btn sm p" id="rp-mes" onclick="setReportePeriodo('mes')">Este mes</button>
    <button class="btn sm" id="rp-3m" onclick="setReportePeriodo('3meses')">3 meses</button>
    <button class="btn sm" id="rp-anio" onclick="setReportePeriodo('anio')">Este año</button>
    <button class="btn sm" id="rp-todo" onclick="setReportePeriodo('todo')">Todo</button>
  </div>
  <div id="reporte-body"></div>`;
  buildReporte('mes');
}

let currentPeriodo='mes';
window.setReportePeriodo=p=>{
  currentPeriodo=p;
  document.querySelectorAll('[id^="rp-"]').forEach(b=>b.classList.remove('p'));
  let map={'semana':'rp-sem','mes':'rp-mes','3meses':'rp-3m','anio':'rp-anio','todo':'rp-todo'};
  if($(map[p]))$(map[p]).classList.add('p');
  buildReporte(p);
};

function getRange(periodo){
  let now=new Date(),desde,hasta=now.toISOString().slice(0,10);
  if(periodo==='semana'){let d=new Date(now);d.setDate(d.getDate()-d.getDay());desde=d.toISOString().slice(0,10);}
  else if(periodo==='mes'){desde=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';}
  else if(periodo==='3meses'){let d=new Date(now);d.setMonth(d.getMonth()-3);desde=d.toISOString().slice(0,10);}
  else if(periodo==='anio'){desde=now.getFullYear()+'-01-01';}
  else{desde='2000-01-01';}
  return {desde,hasta};
}

function buildReporte(periodo){
  let el=$('reporte-body');if(!el)return;
  let {desde,hasta}=getRange(periodo);
  let inRange=(fecha)=>fecha&&fecha>=desde&&fecha<=hasta;

  // Presupuestos emitidos en el período
  let emitidos=state.presupuestos.filter(p=>inRange(p.fechaEntrega||p.createdAt&&new Date(p.createdAt).toISOString().slice(0,10)));
  let confirmados=emitidos.filter(p=>['confirmado','produccion','finalizado','entregado'].includes(p.estado));
  let pendientes=emitidos.filter(p=>p.estado==='pendiente');
  let cancelados=emitidos.filter(p=>p.estado==='cancelado');

  // Dinero que ingresó en el período (caja ingresos)
  let ingresos=state.caja.filter(m=>m.tipo==='ingreso'&&inRange(m.fecha));
  let egresos=state.caja.filter(m=>m.tipo==='egreso'&&inRange(m.fecha));
  let gastosPeriodo=state.gastos.filter(g=>inRange(g.fecha));

  let totalEmitido=emitidos.reduce((s,p)=>s+(p.total||0),0);
  let totalConfirmado=confirmados.reduce((s,p)=>s+(p.total||0),0);
  let totalIngresado=ingresos.reduce((s,m)=>s+(m.monto||0),0);
  let totalEgresado=egresos.reduce((s,m)=>s+(m.monto||0),0);
  let totalGastos=gastosPeriodo.reduce((s,g)=>s+(g.monto||0),0);
  let flujo=totalIngresado-totalEgresado;

  // Agrupar ingresos por medio de pago
  let porMedio={};
  ingresos.forEach(m=>{let k=m.medio||'Sin especificar';porMedio[k]=(porMedio[k]||0)+(m.monto||0);});

  // Agrupar gastos por categoría
  let porCat={};
  gastosPeriodo.forEach(g=>{let k=g.cat||'Sin categoría';porCat[k]=(porCat[k]||0)+(g.monto||0);});

  // Presupuestos por estado tabla
  let porEstado={};
  emitidos.forEach(p=>{let e=p.estado||'pendiente';if(!porEstado[e])porEstado[e]={cant:0,total:0};porEstado[e].cant++;porEstado[e].total+=(p.total||0);});

  // Línea temporal — agrupar por semana o mes
  let byFecha={};
  emitidos.forEach(p=>{
    let f=(p.fechaEntrega||'');
    let key=periodo==='anio'||periodo==='todo'?f.slice(0,7):f.slice(0,10);
    if(!key)return;
    if(!byFecha[key])byFecha[key]={emitidos:0,montoEmitido:0,confirmados:0,montoConf:0};
    byFecha[key].emitidos++;byFecha[key].montoEmitido+=(p.total||0);
    if(['confirmado','produccion','finalizado','entregado'].includes(p.estado)){byFecha[key].confirmados++;byFecha[key].montoConf+=(p.total||0);}
  });

  el.innerHTML=`
  <!-- KPIs principales -->
  <div class="metrics" style="grid-template-columns:1fr 1fr">
    <div class="metric"><small>Presupuestos emitidos</small><strong>${emitidos.length}</strong><div class="cnt">${fmt(totalEmitido)}</div></div>
    <div class="metric"><small>Confirmados</small><strong style="color:var(--accent)">${confirmados.length}</strong><div class="cnt">${fmt(totalConfirmado)}</div></div>
    <div class="metric"><small>Pendientes</small><strong style="color:var(--warn)">${pendientes.length}</strong></div>
    <div class="metric"><small>Cancelados</small><strong style="color:var(--danger)">${cancelados.length}</strong></div>
  </div>

  <!-- Flujo de dinero -->
  <div class="card">
    <b style="font-size:13px">Flujo de dinero</b>
    <div class="metrics" style="margin-top:10px;margin-bottom:0">
      <div class="metric"><small>Ingresos caja</small><strong style="color:var(--accent)">${fmt(totalIngresado)}</strong><div class="cnt">${ingresos.length} mov.</div></div>
      <div class="metric"><small>Egresos caja</small><strong style="color:var(--danger)">${fmt(totalEgresado)}</strong><div class="cnt">${egresos.length} mov.</div></div>
      <div class="metric"><small>Flujo neto</small><strong style="color:${flujo>=0?'var(--accent)':'var(--danger)'}">${fmt(flujo)}</strong></div>
      <div class="metric"><small>Gastos del período</small><strong style="color:var(--danger)">${fmt(totalGastos)}</strong></div>
    </div>
  </div>

  <!-- Ingresos por medio de pago -->
  ${Object.keys(porMedio).length?`<div class="card">
    <b style="font-size:13px">Ingresos por medio de pago</b>
    ${Object.entries(porMedio).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border)">
      <div style="font-size:13px">${k}</div>
      <b>${fmt(v)}</b>
    </div>`).join('')}
  </div>`:''}

  <!-- Gastos por categoría -->
  ${Object.keys(porCat).length?`<div class="card">
    <b style="font-size:13px">Gastos por categoría</b>
    ${Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border)">
      <div style="font-size:13px">${k}</div>
      <b style="color:var(--danger)">${fmt(v)}</b>
    </div>`).join('')}
  </div>`:''}

  <!-- Presupuestos por estado -->
  ${Object.keys(porEstado).length?`<div class="card">
    <b style="font-size:13px">Presupuestos por estado</b>
    <table style="width:100%;border-collapse:collapse;margin-top:10px">
      <thead><tr>
        <th style="text-align:left;font-size:10px;text-transform:uppercase;color:var(--muted);padding-bottom:6px;border-bottom:.5px solid var(--border)">Estado</th>
        <th style="text-align:center;font-size:10px;text-transform:uppercase;color:var(--muted);padding-bottom:6px;border-bottom:.5px solid var(--border)">Cantidad</th>
        <th style="text-align:right;font-size:10px;text-transform:uppercase;color:var(--muted);padding-bottom:6px;border-bottom:.5px solid var(--border)">Monto total</th>
      </tr></thead>
      <tbody>
        ${Object.entries(porEstado).map(([e,v])=>`<tr>
          <td style="padding:8px 0;border-bottom:.5px solid var(--border)"><span class="badge b-${e}">${e}</span></td>
          <td style="text-align:center;padding:8px 0;border-bottom:.5px solid var(--border)">${v.cant}</td>
          <td style="text-align:right;font-weight:700;padding:8px 0;border-bottom:.5px solid var(--border)">${fmt(v.total)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`:''}

  <!-- Detalle presupuestos -->
  ${emitidos.length?`<div class="card">
    <b style="font-size:13px">Detalle de presupuestos</b>
    ${emitidos.sort((a,b)=>(b.fechaEntrega||'').localeCompare(a.fechaEntrega||'')).map(p=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border);gap:8px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px">${p.numero||''} · ${p.descripcion||'Presupuesto'}</div>
        <div style="font-size:11px;color:var(--muted)">${clienteName(p.clienteId)}${p.fechaEntrega?' · '+p.fechaEntrega:''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-weight:700">${fmt(p.total)}</div>
        <span class="badge b-${p.estado}">${p.estado}</span>
      </div>
    </div>`).join('')}
  </div>`:'<div class="card" style="text-align:center;color:var(--muted)">Sin presupuestos en este período</div>'}
  `;
}

// ── OVERLAY HELPER ────────────────────────────────────────────────────────
window.makeOverlay=function(id,title,html,_dep,noBtn,noAction){
  let existing=$(id);if(existing)existing.remove();
  let o=document.createElement('div');o.className='overlay open';o.id=id;
  o.innerHTML=`<div class="sheet"><div class="sheet-title"><span>${title}</span><button class="close" onclick="closeOv('${id}')">×</button></div>${html}</div>`;
  o.addEventListener('click',e=>{if(e.target===o)closeOv(id)});
  $('overlays').appendChild(o);
};
window.closeOv=id=>$(id)&&$(id).remove();
window.delDoc=delDoc;
